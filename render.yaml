services:
  - type: web
    name: genoma
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: GENOMA_STATE_DIR
        value: /data/.genoma
      - key: GENOMA_WORKSPACE_DIR
        value: /data/workspace
      - key: GENOMA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: genoma-data
      mountPath: /data
      sizeGB: 1
